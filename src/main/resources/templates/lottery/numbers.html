<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lotteryType.name} + ' - Pick Numbers'">Pick Numbers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container">
        <div style="margin-top:1.5rem; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem">
            <a th:href="@{/lottery/select}" class="text-muted text-sm">← Back</a>
            <span class="text-muted">/</span>
            <span class="text-sm" th:text="${lotteryType.name}">Powerball</span>
        </div>

        <div class="card" style="margin-bottom:1rem">
            <div class="card-header">
                <span class="card-title" th:text="${lotteryType.name}">Powerball</span>
                <span class="badge badge-green">$<span th:text="${lotteryType.price}">2.00</span>/ticket</span>
            </div>

            <div class="card-body">
                <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

                <!-- Selected Numbers Preview -->
                <div style="margin-bottom:1.25rem">
                    <div class="form-label">Your Selection</div>
                    <div class="selected-display" id="selectedDisplay">
                        <span class="placeholder-text" id="placeholderText">Select <span
                                th:text="${lotteryType.mainCount}">5</span> numbers + 1 bonus</span>
                    </div>
                </div>

                <!-- Quick Pick Button -->
                <div style="margin-bottom:1.25rem">
                    <button type="button" class="btn btn-outline btn-sm" onclick="quickPick()">⚡ Quick Pick</button>
                    <button type="button" class="btn btn-sm"
                        style="background:#f3f4f6; color:#374151; border:1px solid #d1d5db" onclick="clearSelection()">✕
                        Clear</button>
                </div>

                <!-- Main Numbers Grid -->
                <div class="form-label">Main Numbers (pick <span th:text="${lotteryType.mainCount}">5</span> from
                    1-<span th:text="${lotteryType.mainMax}">69</span>)</div>
                <div class="number-grid" id="mainGrid">
                    <div th:each="i : ${#numbers.sequence(1, lotteryType.mainMax)}" class="number-ball" th:text="${i}"
                        th:attr="data-num=${i}" th:onclick="'toggleMain(' + ${i} + ')'"></div>
                </div>

                <!-- Bonus Numbers Grid -->
                <div class="form-label" style="margin-top:1rem">
                    Bonus Number (1-<span th:text="${lotteryType.bonusMax}">26</span>)
                    <span th:text="${lotteryType.name == 'Powerball'} ? '— Powerball' : '— Mega Ball'"
                        class="text-muted text-sm" style="font-weight:400"></span>
                </div>
                <div class="number-grid" id="bonusGrid">
                    <div th:each="i : ${#numbers.sequence(1, lotteryType.bonusMax)}" class="number-ball bonus"
                        th:text="${i}" th:attr="data-num=${i}" th:onclick="'toggleBonus(' + ${i} + ')'"></div>
                </div>

                <!-- Add to Cart Form -->
                <form id="addToCartForm" th:action="@{/lottery/add-to-cart}" method="post" style="margin-top:1.5rem">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="lotteryTypeId" th:value="${lotteryType.id}">
                    <input type="hidden" name="mainNumbers" id="mainNumbersInput">
                    <input type="hidden" name="bonusNumber" id="bonusNumberInput">

                    <button type="button" class="btn btn-primary btn-lg" id="addToCartBtn" onclick="submitForm()"
                        disabled>
                        🛒 Add to Cart
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const MAX_MAIN = /*[[${lotteryType.mainCount}]]*/ 5;
        const LOTTERY_TYPE_ID = /*[[${lotteryType.id}]]*/ 1;

        let selectedMain = [];
        let selectedBonus = null;

        function toggleMain(num) {
            const idx = selectedMain.indexOf(num);
            if (idx >= 0) {
                selectedMain.splice(idx, 1);
                document.querySelector(`#mainGrid [data-num="${num}"]`).classList.remove('selected');
            } else {
                if (selectedMain.length >= MAX_MAIN) {
                    const removed = selectedMain.shift();
                    document.querySelector(`#mainGrid [data-num="${removed}"]`).classList.remove('selected');
                }
                selectedMain.push(num);
                document.querySelector(`#mainGrid [data-num="${num}"]`).classList.add('selected');
            }
            updateDisplay();
        }

        function toggleBonus(num) {
            if (selectedBonus === num) {
                selectedBonus = null;
                document.querySelector(`#bonusGrid [data-num="${num}"]`).classList.remove('selected');
            } else {
                if (selectedBonus !== null) {
                    document.querySelector(`#bonusGrid [data-num="${selectedBonus}"]`).classList.remove('selected');
                }
                selectedBonus = num;
                document.querySelector(`#bonusGrid [data-num="${num}"]`).classList.add('selected');
            }
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('selectedDisplay');
            const placeholder = document.getElementById('placeholderText');
            const btn = document.getElementById('addToCartBtn');

            display.innerHTML = '';

            const sorted = [...selectedMain].sort((a, b) => a - b);
            sorted.forEach(n => {
                const ball = document.createElement('div');
                ball.className = 'selected-ball';
                ball.textContent = n;
                display.appendChild(ball);
            });

            if (selectedBonus !== null) {
                const sep = document.createElement('span');
                sep.textContent = '|';
                sep.style.color = '#9ca3af';
                display.appendChild(sep);

                const ball = document.createElement('div');
                ball.className = 'selected-ball bonus-ball';
                ball.textContent = selectedBonus;
                display.appendChild(ball);
            }

            if (selectedMain.length === 0 && selectedBonus === null) {
                const ph = document.createElement('span');
                ph.className = 'placeholder-text';
                ph.textContent = `Select ${MAX_MAIN} numbers + 1 bonus`;
                display.appendChild(ph);
            }

            btn.disabled = !(selectedMain.length === MAX_MAIN && selectedBonus !== null);
        }

        function submitForm() {
            if (selectedMain.length !== MAX_MAIN || selectedBonus === null) return;
            document.getElementById('mainNumbersInput').value = [...selectedMain].sort((a, b) => a - b).join(',');
            document.getElementById('bonusNumberInput').value = selectedBonus;
            document.getElementById('addToCartForm').submit();
        }

        function clearSelection() {
            selectedMain.forEach(n => document.querySelector(`#mainGrid [data-num="${n}"]`).classList.remove('selected'));
            if (selectedBonus !== null) document.querySelector(`#bonusGrid [data-num="${selectedBonus}"]`).classList.remove('selected');
            selectedMain = [];
            selectedBonus = null;
            updateDisplay();
        }

        function quickPick() {
            fetch(`/lottery/quick-pick?lotteryTypeId=${LOTTERY_TYPE_ID}`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': document.querySelector('[name="_csrf"]')?.value || '' }
            })
                .then(r => r.json())
                .then(data => {
                    clearSelection();
                    data.mainNumbers.forEach(n => toggleMain(n));
                    toggleBonus(data.bonusNumber);
                });
        }
    </script>

</body>

</html>
