<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container">
        <div class="page-header" style="margin-top:1.5rem">
            <h1 class="page-title">My Tickets</h1>
            <p class="page-subtitle">Your purchase history</p>
        </div>

        <!-- Flash message -->
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <!-- Stats -->
        <div th:if="${!#lists.isEmpty(tickets)}" class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Tickets</div>
                <div class="stat-value text-primary" th:text="${tickets.size()}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Spent</div>
                <div class="stat-value text-success">$<span th:text="${totalSpent}">0.00</span></div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(tickets)}" class="card">
            <div class="card-body empty-state">
                <div class="empty-icon">🎫</div>
                <div class="empty-title">No tickets yet</div>
                <p class="text-muted text-sm" style="margin-bottom:1rem">Purchase your first lottery ticket</p>
                <a th:href="@{/lottery/select}" class="btn btn-primary">Buy Tickets</a>
            </div>
        </div>

        <!-- Tickets table -->
        <div th:if="${!#lists.isEmpty(tickets)}" class="card">
            <div class="card-header">
                <span class="card-title">Purchase History</span>
                <a th:href="@{/lottery/select}" class="btn btn-primary btn-sm">+ Buy More</a>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Game</th>
                            <th>Numbers</th>
                            <th>Amount</th>
                            <th>Purchased</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ticket : ${tickets}">
                            <td class="text-muted text-sm">#<span th:text="${ticket.id}">1</span></td>
                            <td>
                                <span class="badge badge-blue" th:text="${ticket.lotteryType.name}">Powerball</span>
                            </td>
                            <td>
                                <div th:each="tn : ${ticket.ticketNumbers}" style="margin-bottom:.35rem">
                                    <div class="ticket-numbers">
                                        <div th:each="num : ${tn.mainNumbersArray}" class="num-chip" th:text="${num}">5
                                        </div>
                                        <span class="text-muted" style="margin:0 2px">|</span>
                                        <div class="num-chip bonus-chip" th:text="${tn.bonusNumber}">12</div>
                                    </div>
                                </div>
                            </td>
                            <td class="fw-bold text-success">$<span th:text="${ticket.totalAmount}">2.00</span></td>
                            <td class="text-muted text-sm">
                                <span
                                    th:text="${#temporals.format(ticket.dateOfSelling, 'MMM dd, yyyy HH:mm')}">Date</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
