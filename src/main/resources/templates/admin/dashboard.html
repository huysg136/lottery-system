<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container" style="margin-top: 2rem;">
        <div class="page-header d-flex justify-between" style="align-items:center;">
            <div>
                <h1 class="page-title text-primary">Admin Dashboard</h1>
                <p class="page-subtitle">Manage all purchased tickets</p>
            </div>
            <div>
                <a th:href="@{/admin/export/pdf}" class="btn btn-primary">📄 Export All to PDF</a>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">All Tickets
                Sold</h3>

            <div th:if="${#lists.isEmpty(tickets)}" class="text-center"
                style="padding: 3rem 0; color: var(--text-muted);">
                <i>No tickets have been sold yet.</i>
            </div>

            <div th:if="${!#lists.isEmpty(tickets)}">
                <table class="table" style="margin-bottom: 0;">
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>User (Email)</th>
                            <th>Game</th>
                            <th>Numbers</th>
                            <th>Price</th>
                            <th>Selling Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ticket : ${tickets}">
                            <td th:text="${'#' + ticket.id}">#1</td>
                            <td
                                th:text="${ticket.user.firstName + ' ' + ticket.user.lastName + ' (' + ticket.user.email + ')'}">
                                User Name</td>
                            <td>
                                <span class="badge"
                                    th:classappend="${ticket.lotteryType.name == 'Powerball' ? 'badge-primary' : 'badge-green'}"
                                    th:text="${ticket.lotteryType.name}">Powerball</span>
                            </td>
                            <td>
                                <div th:each="num : ${ticket.ticketNumbers}" class="d-flex"
                                    style="flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.25rem;">
                                    <span class="num-chip" th:text="${num.mainNumbers}">1,2,3,4,5</span>
                                    <span class="num-chip bonus-chip" th:text="${num.bonusNumber}">12</span>
                                </div>
                            </td>
                            <td class="fw-bold text-success">$<span th:text="${ticket.totalAmount}">2.00</span></td>
                            <td class="text-muted text-sm"
                                th:text="${#temporals.format(ticket.dateOfSelling, 'MMM dd, yyyy HH:mm')}">Date</td>
                            <td>
                                <span th:if="${ticket.publishedDate == null}" class="badge badge-gray">Pending
                                    Draw</span>
                                <span th:if="${ticket.publishedDate != null}" class="badge badge-primary">Drawn</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
