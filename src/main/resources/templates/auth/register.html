<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card" style="max-width:440px;">
            <div style="text-align:center; margin-bottom:1.5rem">
                <div style="font-size:2.5rem; margin-bottom:.5rem">🎰</div>
                <h1 class="auth-title">Create account</h1>
                <p class="auth-subtitle">Join Lottery System today</p>
            </div>

            <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

            <form th:action="@{/register}" method="post" th:object="${dto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label class="form-label" for="firstName">First Name</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                            placeholder="First name">
                        <div class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                            placeholder="Last name">
                        <div class="form-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                        placeholder="Enter your email">
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control"
                        placeholder="Choose a username">
                    <div class="form-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                        placeholder="At least 6 characters">
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                        placeholder="Repeat your password">
                    <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}"
                        th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-full">Create Account</button>
            </form>

            <p class="auth-divider">Already have an account? <a th:href="@{/login}" class="text-primary"
                    style="font-weight:600">Sign in</a></p>
        </div>
    </div>

</body>

</html>
