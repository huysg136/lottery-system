<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div style="text-align:center; margin-bottom:1.5rem">
                <div style="font-size:2.5rem; margin-bottom:.5rem">🎰</div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your Lottery account</p>
            </div>

            <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
            <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="margin-top:.5rem">Sign In</button>
            </form>

            <p class="auth-divider">Don't have an account? <a th:href="@{/register}" class="text-primary"
                    style="font-weight:600">Register</a></p>
        </div>
    </div>

</body>

</html>
