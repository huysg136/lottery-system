<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container">
        <div class="page-header" style="margin-top:1.5rem">
            <h1 class="page-title">Shopping Cart</h1>
            <p class="page-subtitle" th:text="${cartItems.size()} + ' ticket(s) in cart'">0 tickets</p>
        </div>

        <!-- Flash messages -->
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <!-- Empty cart -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="card">
            <div class="card-body empty-state">
                <div class="empty-icon">🛒</div>
                <div class="empty-title">Your cart is empty</div>
                <p class="text-muted text-sm" style="margin-bottom:1rem">Add some tickets to get started</p>
                <a th:href="@{/lottery/select}" class="btn btn-primary">Browse Lotteries</a>
            </div>
        </div>

        <!-- Cart items -->
        <div th:if="${!#lists.isEmpty(cartItems)}">
            <div class="card" style="margin-bottom:1rem">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Game</th>
                                <th>Numbers</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, stat : ${cartItems}">
                                <td class="text-muted" th:text="${stat.count}">1</td>
                                <td>
                                    <span class="badge badge-blue" th:text="${item.lotteryType.name}">Powerball</span>
                                </td>
                                <td>
                                    <div class="ticket-numbers">
                                        <div th:each="num : ${item.mainNumbersArray}" class="num-chip" th:text="${num}">
                                            5</div>
                                        <span class="text-muted" style="margin:0 2px">|</span>
                                        <div class="num-chip bonus-chip" th:text="${item.bonusNumber}">12</div>
                                    </div>
                                </td>
                                <td>
                                    <span class="fw-bold fs-5 text-success">
                                        $<span th:text="${item.lotteryType.price}">2.00</span>
                                    </span>
                                </td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/cart/edit/{id}(id=${item.id})}"
                                            class="btn btn-outline btn-sm">Edit</a>
                                        <form th:action="@{/cart/delete/{id}(id=${item.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-danger btn-sm"
                                                onclick="return confirm('Remove this ticket?')">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Order Summary</span>
                </div>
                <div class="card-body">
                    <div class="d-flex justify-between" style="margin-bottom:.5rem">
                        <span class="text-muted">Tickets</span>
                        <span th:text="${cartItems.size()} + ' ticket(s)'">1 ticket(s)</span>
                    </div>
                    <div class="d-flex justify-between" style="padding-top:.75rem; border-top: 1px solid var(--border)">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold text-primary" style="font-size:1.125rem">
                            $<span th:text="${total}">0.00</span>
                        </span>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2" style="justify-content:flex-end">
                    <a th:href="@{/lottery/select}" class="btn btn-outline">+ Add More</a>
                    <form th:action="@{/cart/checkout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-success btn-lg"
                            onclick="return confirm('Confirm your purchase?')" ✅ Checkout ($<span
                            th:text="${total}">2.00</span>)
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
