<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Cart Item - Lottery System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container">
        <div class="page-header text-center">
            <h1 class="page-title text-primary"><span th:text="${lotteryType.name}">Lottery</span> - Edit Numbers</h1>
            <p class="page-subtitle">Update your lucky numbers or use Quick Pick</p>
        </div>

        <div class="card" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
            <!-- Game Info -->
            <div class="text-center" style="margin-bottom: 2rem;">
                <h4>Pick <span th:text="${lotteryType.mainCount}" id="mainCount">5</span> from 1 to <span
                        th:text="${lotteryType.mainMax}" id="mainMax">69</span></h4>
                <h4>+ 1 Bonus from 1 to <span th:text="${lotteryType.bonusMax}" id="bonusMax">26</span></h4>
                <div style="margin-top:1rem;">
                    <button type="button" class="btn btn-outline" id="quickPickBtn">⚡ Auto Quick Pick</button>
                    <button type="button" class="btn btn-outline" id="clearBtn">🗑️ Clear All</button>
                </div>
            </div>

            <form th:action="@{/cart/update/{id}(id=${cartItem.id})}" method="post" id="lottoForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Number Grids -->
                <div class="form-group">
                    <label class="form-label" style="text-align:center; font-size:1.25rem;">Main Numbers</label>
                    <div class="number-grid" id="mainGrid">
                        <!-- JS generated -->
                    </div>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <label class="form-label text-danger" style="text-align:center; font-size:1.25rem;">Bonus
                        Number</label>
                    <div class="number-grid" id="bonusGrid">
                        <!-- JS generated -->
                    </div>
                </div>

                <!-- Hidden inputs for submission -->
                <div id="hiddenInputs"></div>

                <div class="d-flex justify-between" style="margin-top: 2rem;">
                    <a th:href="@{/cart}" class="btn btn-outline">Cancel</a>
                    <button type="button" class="btn btn-primary btn-lg" id="saveBtn">Save Changes</button>
                </div>
            </form>
        </div>

        <script th:inline="javascript">
            const mainMax = parseInt(/*[[${lotteryType.mainMax}]]*/ 69);
            const mainCount = parseInt(/*[[${lotteryType.mainCount}]]*/ 5);
            const bonusMax = parseInt(/*[[${lotteryType.bonusMax}]]*/ 26);
            const lotteryTypeId = /*[[${lotteryType.id}]]*/ 1;

            // Load existing numbers
            const existingMainNumbers = /*[[${cartItem.mainNumbers}]]*/[];
            const existingBonus = /*[[${cartItem.bonusNumber}]]*/ null;

            let selectedMain = new Set(existingMainNumbers);
            let selectedBonus = existingBonus;

            const mainGrid = document.getElementById('mainGrid');
            const bonusGrid = document.getElementById('bonusGrid');
            const hiddenInputs = document.getElementById('hiddenInputs');
            const csrfToken = document.querySelector('input[name="_csrf"]').value;

            // Generate grids
            for (let i = 1; i <= mainMax; i++) {
                const num = document.createElement('div');
                num.className = 'grid-number main-num' + (selectedMain.has(i) ? ' selected' : '');
                num.textContent = i;
                num.onclick = () => toggleMain(i, num);
                mainGrid.appendChild(num);
            }

            for (let i = 1; i <= bonusMax; i++) {
                const num = document.createElement('div');
                num.className = 'grid-number bonus-num' + (selectedBonus === i ? ' selected-bonus' : '');
                num.textContent = i;
                num.onclick = () => selectBonus(i, num);
                bonusGrid.appendChild(num);
            }

            function toggleMain(num, element) {
                if (selectedMain.has(num)) {
                    selectedMain.delete(num);
                    element.classList.remove('selected');
                } else {
                    if (selectedMain.size >= mainCount) {
                        alert("You can only select " + mainCount + " main numbers.");
                        return;
                    }
                    selectedMain.add(num);
                    element.classList.add('selected');
                }
            }

            function selectBonus(num, element) {
                document.querySelectorAll('.bonus-num').forEach(el => el.classList.remove('selected-bonus'));
                selectedBonus = num;
                element.classList.add('selected-bonus');
            }

            // Quick Pick
            document.getElementById('quickPickBtn').onclick = () => {
                fetch('/lottery/quick-pick?lotteryTypeId=' + lotteryTypeId, {
                    method: 'POST',
                    headers: { 'X-CSRF-TOKEN': csrfToken }
                })
                    .then(res => res.json())
                    .then(data => {
                        selectedMain.clear();
                        data.mainNumbers.forEach(n => selectedMain.add(n));
                        selectedBonus = data.bonusNumber;

                        // Update UI
                        document.querySelectorAll('.main-num').forEach(el => {
                            const val = parseInt(el.textContent);
                            el.classList.toggle('selected', selectedMain.has(val));
                        });
                        document.querySelectorAll('.bonus-num').forEach(el => {
                            const val = parseInt(el.textContent);
                            el.classList.toggle('selected-bonus', val === selectedBonus);
                        });
                    });
            };

            // Clear All
            document.getElementById('clearBtn').onclick = () => {
                selectedMain.clear();
                selectedBonus = null;
                document.querySelectorAll('.grid-number').forEach(el => {
                    el.classList.remove('selected', 'selected-bonus');
                });
            };

            // Save
            document.getElementById('saveBtn').onclick = () => {
                if (selectedMain.size !== mainCount) {
                    alert('Please select exactly ' + mainCount + ' main numbers.');
                    return;
                }
                if (!selectedBonus) {
                    alert('Please select a bonus number.');
                    return;
                }

                hiddenInputs.innerHTML = '';
                // Add main numbers
                Array.from(selectedMain).sort((a, b) => a - b).forEach(num => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'mainNumbers';
                    input.value = num;
                    hiddenInputs.appendChild(input);
                });

                // Add bonus number
                const bInput = document.createElement('input');
                bInput.type = 'hidden';
                bInput.name = 'bonusNumber';
                bInput.value = selectedBonus;
                hiddenInputs.appendChild(bInput);

                document.getElementById('lottoForm').submit();
            };
        </script>
    </div>
</body>

</html>
